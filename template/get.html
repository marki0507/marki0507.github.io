$def with(data)

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tugas Kedua</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous" />
      <style>
       .logo{
      font-size: 30px;
      color: white;
      font-weight: bold;
      text-decoration: none;
      
    }
    
        .main-nav {
          /* background-color: #ffb703; */
          background-color: #003049;
        }
    
        .main-nav .navbar-nav a.nav-link {
          color: white;
          font-size: 20px;
          font-weight: 20px;
          margin: 5px;
        }
    
        .main-nav .navbar-nav .nav-link.active,
        .main-nav .navbar-nav .nav-link:hover {
          transition: 0.2s linear;
          /* background-color: #fb5607; */
          background-color: #c47114;
          border-radius: 10px;
          /* color: #fb5607; */
        }
    
        body {
          background-color: #f35b04;
        }
    
        .card {
          background-color: #f18701;
          width: 400px;
          margin: 0 auto;
          padding: 24px;
          margin-top: 9%;
        }
    
        .card h5 {
          color: white;
        }
      </style>
    </head>
    <body>
      <header class="navbar sticky-top navbar-expand-lg main-nav">
        <div class="container">
          <a class="logo" href="/muhikram/waktu">Punya.dev</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNavAltMarkup"
            aria-controls="navbarNavAltMarkup"
            aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav ms-auto py-3">
              <a class="nav-link active px-3" aria-current="page" href="/muhikram/waktu"
                >Kembali</a
              >
      </header>


    <div class="card">
      <h5 class="card-header">Selamat "$:data['a']" kamu berhasil Masuk >_<</h5>
      <div class="card-body">
        <h5 class="card-title">
          Nama = $:data['a'] <br />
          Status = $:data['b'] <br />
          Umur = $:data['c']
        </h5>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"></script>
  </body>
</html>
